services:
  - type: web
    name: prevoir-task-manager
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prevoir-task-manager-db
          property: connectionString

databases:
  - name: prevoir-task-manager-db
    plan: free
